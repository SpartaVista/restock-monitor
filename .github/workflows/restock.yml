name: Restock monitor

on:
  schedule:
    # Every hour. The job itself then long-polls for ~55 minutes, which is how
    # we get 1-minute granularity despite GitHub's cron being imprecise.
    - cron: "0 * * * *"
  workflow_dispatch: {}   # lets you kick off a run manually from the Actions tab

# Never let two runs overlap and fight over state.json.
concurrency:
  group: restock-monitor
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit state.json back to the repo

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Poll for restocks
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_SECONDS: "3300"
          POLL_SECONDS: "60"
        run: python monitor.py

      - name: Persist stock state
        if: always()
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "restock-bot"
            git config user.email "restock-bot@users.noreply.github.com"
            git add state.json
            git commit -m "state: stock change [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push
          else
            echo "no state change"
          fi
